<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#D4AF37" stroke-width="4">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" stroke="#8B0000" stroke-width="2" fill="#FFFFFF"/>
  <circle cx="50" cy="50" r="40" stroke="#D4AF37" stroke-width="2"/>
  <!-- Russian/Orthodox Cross Structure -->
  <line x1="50" y1="20" x2="50" y2="80"/> <!-- Vertical -->
  <line x1="30" y1="40" x2="70" y2="40"/> <!-- Main horizontal -->
  <line x1="40" y1="28" x2="60" y2="28" stroke-width="3"/> <!-- Top horizontal -->
  <line x1="35" y1="65" x2="65" y2="55" stroke-width="3"/> <!-- Bottom slanted -->
</svg>
