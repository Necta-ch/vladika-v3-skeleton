<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#6b151b"/>
  <!-- Orthodox/Serbian cross (three-bar cross with slanted bottom bar) -->
  <g fill="#D4AF37">
    <!-- Vertical beam -->
    <rect x="28" y="8" width="8" height="48" rx="1"/>
    <!-- Top horizontal bar (short) -->
    <rect x="22" y="14" width="20" height="6" rx="1"/>
    <!-- Middle horizontal bar (main crossbar) -->
    <rect x="18" y="26" width="28" height="6" rx="1"/>
    <!-- Bottom slanted bar -->
    <rect x="20" y="42" width="24" height="5" rx="1" transform="rotate(-20, 32, 44.5)"/>
  </g>
</svg>
